name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --features async --locked
      - name: Test
        run: cargo test --workspace --features async --locked -- --skip cross_process_pub_sub_reliable --skip cross_process_pub_sub_best_effort

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake
        uses: lukka/get-cmake@latest
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --features async --locked
      - name: Test
        run: cargo test --workspace --features async --locked -- --skip cross_process_pub_sub_reliable --skip cross_process_pub_sub_best_effort

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --features async --locked
      - name: Test
        run: cargo test --workspace --features async --locked -- --skip cross_process_pub_sub_reliable --skip cross_process_pub_sub_best_effort
